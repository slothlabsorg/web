[build]
  command = "npm run build"
  publish = "out"
[functions]
  directory = "netlify/functions"

# ── Tauri in-app updater endpoints ────────────────────────────────────────────
# All apps route through /api/updater/:app/:target/:version → Netlify function.
# NOTE: CloudOrbit's tauri.conf.json must point to:
#   https://slothlabs.org/api/updater/cloudorbit/{{target}}/{{current_version}}
# The other 4 apps (WattsOrbit, DataOrbit, BastionOrbit, ProxyOrbit) use
# raw.githubusercontent.com/slothlabsorg/{app}/main/latest.json — no Netlify needed.
[[redirects]]
  from   = "/api/updater/cloudorbit/:target/*"
  to     = "/.netlify/functions/updater"
  status = 200
  force  = true

# SPA fallback (keep existing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
